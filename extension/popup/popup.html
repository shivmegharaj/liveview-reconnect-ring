<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="light dark" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="glow" aria-hidden="true"></div>
    <header>
      <div class="brand">
        <span class="mark" aria-hidden="true"></span>
        <div class="brand-text">
          <h1>LiveView Reconnect Ring</h1>
          <p class="tagline" id="summary">Checking...</p>
        </div>
      </div>
      <div class="header-actions">
        <button type="button" class="icon-btn" id="refresh" title="Refresh camera status">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path fill="currentColor" d="M17.65 6.35A7.95 7.95 0 0 0 12 4V1L7 6l5 5V7a5 5 0 1 1-4.5 2.81l-1.74-.98A7 7 0 1 0 19 12h-2a5 5 0 0 1-.35-5.65z"/>
          </svg>
          <span>Refresh</span>
        </button>
      </div>
    </header>

    <section class="controls">
      <label class="switch" title="Pause all automatic reconnects">
        <input type="checkbox" id="enabled" />
        <span class="track" aria-hidden="true"></span>
        <span class="label">Active</span>
      </label>
    </section>

    <main id="tabs"></main>
    <p id="empty" hidden>
      No live dashboards yet. Open Multi-Cam on account.ring.com. Status appears within a few seconds.
    </p>

    <footer>
      <span id="version"></span>
      <span class="hint">built by
        <a
          href="https://github.com/shivmegharaj/liveview-reconnect-ring"
          target="_blank"
          rel="noopener noreferrer"
        >@shivmegharaj</a>
      </span>
    </footer>
    <script src="popup.js"></script>
  </body>
</html>
